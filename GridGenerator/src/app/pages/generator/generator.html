<div class="container-fluid py-4">
  <div class="row">
    
    <!-- Left Column: Configuration & Inputs (col-md-5) -->
    <div class="col-md-5">
      <section class="mb-4">
        <app-store-selector></app-store-selector>
      </section>

      <section class="card shadow-sm p-3">
        <h4 class="mb-3">Product Information</h4>
        <app-product-form 
          (formChanged)="onFormChanged($event)" 
          (productAdded)="onProductAdded($event)">
        </app-product-form>
      </section>
    </div>

    <!-- Right Column: Visualization & Layout (col-md-7) -->
    <div class="col-md-7">
      <div class="card shadow-sm h-100">
        
        <!-- Tab Navigation -->
        <div class="card-header bg-white">
          <ul class="nav nav-tabs card-header-tabs">
            <li class="nav-item">
              <button 
                class="nav-link" 
                [class.active]="activeTab === 'preview'" 
                (click)="activeTab = 'preview'">
                Live Preview
              </button>
            </li>
            <li class="nav-item">
              <button 
                class="nav-link" 
                [class.active]="activeTab === 'print'" 
                (click)="activeTab = 'print'">
                Print Queue ({{ products.length }})
              </button>
            </li>
          </ul>
        </div>

        <!-- Tab Content -->
        <div class="card-body bg-light">
          @if (activeTab === 'preview') {
            <div class="preview-wrapper animate-fade-in">
              <app-card-preview [product]="currentProduct"></app-card-preview>
            </div>
          }

          @if (activeTab === 'print') {
            <div class="print-wrapper animate-fade-in">
              @if (products.length > 0) {
                <app-print-layout [products]="products" (productRemoved)="onProductRemoved($event)"></app-print-layout>
              } @else {
                <div class="text-center py-5">
                  <p class="text-muted">No products added to the print queue yet.</p>
                  <small>Fill the form and click "Add Product" to see them here.</small>
                </div>
              }
            </div>
          }
        </div>

      </div>
    </div>

  </div>
</div>
